<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A Pachas — los gastos de la peña</title>
<meta name="description" content="Los gastos de la peña, a partes iguales. Ni pa ti ni pa mí.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48' fill='none'%3E%3Ccircle cx='24' cy='24' r='19' stroke='%235A50EC' stroke-width='4.5'/%3E%3Cg stroke='%235A50EC' stroke-width='4.5' stroke-linecap='round'%3E%3Cline x1='24' y1='24' x2='24' y2='5'/%3E%3Cline x1='24' y1='24' x2='42.1' y2='18.1'/%3E%3Cline x1='24' y1='24' x2='35.2' y2='39.4'/%3E%3Cline x1='24' y1='24' x2='12.8' y2='39.4'/%3E%3Cline x1='24' y1='24' x2='5.9' y2='18.1'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Instrument+Sans:wght@400..700&display=swap" rel="stylesheet">
<style>
  /* v2 palette from the Claude Design redesign: bright neutral base, festive
     violet primary, green = owed to you, coral = you owe. Ink-dark mode. */
  :root{
    --bg:#F5F6FA;
    --card:#FFFFFF;
    --ink:#171A21;
    --muted:#6A7186;
    --line:#E6E8F0;
    --primary:#5A50EC;
    --onprimary:#FFFFFF;
    --primarysoft:#ECEAFE;
    --green:#0E9256;
    --greensoft:#DCF5E7;
    --coral:#E5484D;
    --coralsoft:#FDE8E8;
    --chip:#EFF1F6;
    --shadow:0 1px 2px rgba(16,18,24,.04);
    --velo:rgba(13,15,22,.5);
    --radius:16px;
    --display:'Bricolage Grotesque',system-ui,-apple-system,sans-serif;
    --texto:'Instrument Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#101218; --card:#191C25; --ink:#EDEFF6; --muted:#99A0B4; --line:#2A2E3C;
      --primary:#9D96FF; --onprimary:#1B1747; --primarysoft:#2A2750;
      --green:#45D48F; --greensoft:#17362A; --coral:#FF8080; --coralsoft:#3D2226;
      --chip:#242836; --shadow:none; --velo:rgba(13,15,22,.5);
    }
  }
  :root[data-theme="light"]{
    --bg:#F5F6FA; --card:#FFFFFF; --ink:#171A21; --muted:#6A7186; --line:#E6E8F0;
    --primary:#5A50EC; --onprimary:#FFFFFF; --primarysoft:#ECEAFE;
    --green:#0E9256; --greensoft:#DCF5E7; --coral:#E5484D; --coralsoft:#FDE8E8;
    --chip:#EFF1F6; --shadow:0 1px 2px rgba(16,18,24,.04); --velo:rgba(13,15,22,.5);
  }
  :root[data-theme="dark"]{
    --bg:#101218; --card:#191C25; --ink:#EDEFF6; --muted:#99A0B4; --line:#2A2E3C;
    --primary:#9D96FF; --onprimary:#1B1747; --primarysoft:#2A2750;
    --green:#45D48F; --greensoft:#17362A; --coral:#FF8080; --coralsoft:#3D2226;
    --chip:#242836; --shadow:none; --velo:rgba(13,15,22,.5);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:var(--texto);
    font-size:15px; line-height:1.45;
    min-height:100dvh;
  }
  #app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
  main{flex:1;padding:14px 20px 104px;overflow-x:hidden}
  body.sin-fiesta #tabbar{display:none}
  body.sin-fiesta main{padding-bottom:30px}
  button{font-family:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--primary);outline-offset:2px}

  /* ---------- theme button ---------- */
  #btnTema{
    /* absolute instead of fixed: it scrolls with the page instead of floating
       over cards. */
    position:absolute;top:14px;right:14px;z-index:50;
    width:38px;height:38px;border-radius:999px;border:1px solid var(--line);
    background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--muted);
  }
  #btnTema svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}

  /* ---------- screen headers ---------- */
  .cabecera{margin:18px 2px 16px}
  .cabecera h1{font-family:var(--display);font-size:26px;font-weight:700;margin:0;line-height:1.15}
  .cabecera .sub{color:var(--muted);font-size:13px;margin-top:3px}

  /* ---------- party hero ---------- */
  .hero{text-align:center;padding:34px 0 6px}
  .hero .logo{color:var(--primary)}
  .hero .logo svg{width:76px;height:76px}
  .hero h1{font-family:var(--display);font-weight:800;font-size:34px;letter-spacing:-.5px;margin:10px 0 6px}
  .hero .lema{color:var(--muted);font-size:14px;line-height:1.5;margin:0 auto 24px;max-width:34ch}

  /* ---------- common ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);display:block;margin:16px 0 7px}
  .card .label:first-child, .campo .label{margin-top:0}
  .btn{border:none;border-radius:11px;padding:12px 16px;font-size:15px;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--primary);color:var(--onprimary)}
  .btn-green{background:var(--green);color:var(--onprimary)}
  .btn-soft{background:var(--primarysoft);color:var(--primary)}
  .btn-borde{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .btn-mini{padding:8px 13px;font-size:13.5px;border-radius:9px}
  .btn-block{width:100%}
  .link-quieto{background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;
    cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:4px 2px}
  input[type=text],input[type=tel],input[type=date],textarea{
    font-family:inherit;font-size:16px;background:var(--card);color:var(--ink);
    border:1px solid var(--line);border-radius:11px;padding:12px 13px;width:100%;
  }
  input::placeholder,textarea::placeholder{color:var(--muted);opacity:.75}
  input:focus,textarea:focus{outline:none;border-color:var(--primary)}
  input[type=date]{min-height:47px}
  textarea{resize:vertical;min-height:90px}
  .fila-add{display:flex;gap:8px;margin-bottom:14px}
  .fila-add input{flex:1;min-width:0}
  .campo{margin-bottom:16px}
  .vacio{text-align:center;color:var(--muted);padding:36px 20px;font-size:14px;line-height:1.6}
  .avatar{
    width:40px;height:40px;border-radius:999px;background:var(--primarysoft);flex:none;
    display:inline-flex;align-items:center;justify-content:center;
    font-family:var(--display);font-weight:700;font-size:16px;color:var(--primary);
  }
  .avatar.mini{width:24px;height:24px;font-size:11px}
  .chip-estado{font-size:12px;font-weight:600;border-radius:999px;padding:4px 10px;white-space:nowrap}
  .chip-neutro{background:var(--chip);color:var(--muted)}
  .chip-primary{background:var(--primarysoft);color:var(--primary)}
  .llave{width:13px;height:13px;color:var(--muted);flex:none}

  /* ---------- party card (brand violet, same in both themes) ---------- */
  .fiesta-card{position:relative;overflow:hidden;background:#5A50EC;border-color:#5A50EC;color:#fff}
  .fiesta-card .label{color:#fff;opacity:.72}
  .fiesta-card .titulo{font-family:var(--display);font-weight:700;font-size:21px;margin:2px 0 3px}
  .fiesta-card .meta{font-size:13px;opacity:.82;margin-bottom:10px}
  .fiesta-card .oculo-marca{position:absolute;right:-42px;top:-34px;width:200px;height:200px;
    color:#fff;opacity:.16;pointer-events:none}
  .fiesta-card .oculo-marca svg{width:100%;height:100%}
  .btn-blanco{background:var(--card);color:var(--primary)}
  .btn-vivo{background:rgba(255,255,255,.16);color:#fff}
  .fiesta-card .estado-sync{color:#fff;opacity:.95;font-weight:600;font-size:13px}
  .estado-sync.vivo::before{content:'';display:inline-block;width:8px;height:8px;
    border-radius:999px;background:#3DDC84;margin-right:7px}
  .quetoca-txt{margin:0 0 12px;font-family:var(--display);font-weight:700;font-size:18px;line-height:1.3}
  .crear-dashed{
    width:100%;border:1.5px dashed var(--line);background:transparent;border-radius:var(--radius);
    color:var(--muted);font-size:14px;font-weight:600;padding:14px;cursor:pointer;
  }
  /* Compact row inside .card. It comes later in the cascade, so it owns its
     spacing; 2px left the text pressed against the border. */
  .yo-fila{display:flex;align-items:center;gap:10px;padding:11px 14px}
  .yo-fila .quien{flex:1;font-size:14px;color:var(--muted)}
  .yo-fila b{color:var(--ink)}

  /* ---------- list ---------- */
  .item-card .fila{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}
  .item-card .nombre{font-weight:600;font-size:15px;line-height:1.35;padding-top:2px}
  .item-card .meta{color:var(--muted);font-size:13px;margin-top:3px}
  .item-card .acciones{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:11px}
  .quitar{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;
    padding:4px 6px;line-height:1;opacity:.6;flex:none}
  .comprada-card{cursor:pointer}
  .comprada-card:active{filter:brightness(.97)}
  .check-comprada{width:26px;height:26px;border-radius:999px;background:var(--greensoft);
    color:var(--green);display:inline-flex;align-items:center;justify-content:center;
    flex:none;margin-top:1px}
  .check-comprada svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.6;
    stroke-linecap:round;stroke-linejoin:round}

  /* ---------- group ---------- */
  .persona-fila{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line);cursor:pointer}
  .persona-fila:last-child{border-bottom:none}
  .persona-fila .centro{flex:1;min-width:0}
  .persona-fila .nombre{font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px}
  .persona-fila .subtexto{color:var(--muted);font-size:13px;margin-top:1px}
  .persona-fila .saldo{text-align:right;font-variant-numeric:tabular-nums}
  .persona-fila .saldo .cifra{font-weight:600;font-size:14.5px}
  .persona-fila .saldo .estado{display:block;font-size:11px;color:var(--muted)}
  .saldo-verde{color:var(--green)}
  .saldo-coral{color:var(--coral)}
  .saldo-neutro{color:var(--muted)}

  /* ---------- accounts ---------- */
  .total-card{display:flex;align-items:baseline;justify-content:space-between;gap:10px;
    padding:18px 16px;text-align:left}
  .total-card .cifra{font-family:var(--display);font-weight:800;font-size:28px;letter-spacing:-.5px;
    font-variant-numeric:tabular-nums}
  .total-card .porcabeza{color:var(--muted);font-size:13px;text-align:right}
  .bizum-fila{display:flex;align-items:center;gap:11px}
  .bizum-fila.hecho{opacity:.55}
  .bizum-fila .quien{flex:1;font-size:14.5px;font-weight:600;min-width:0}
  .bizum-fila .quien svg{width:14px;height:14px;color:var(--muted);vertical-align:-2px;margin:0 3px}
  .bizum-fila .cuanto{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .check{
    width:30px;height:30px;border-radius:999px;border:1.5px solid var(--line);
    background:transparent;cursor:pointer;flex:none;
    display:inline-flex;align-items:center;justify-content:center;color:transparent;
  }
  .check.on{background:var(--green);border-color:var(--green);color:var(--onprimary)}
  .check svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.4;
    stroke-linecap:round;stroke-linejoin:round}
  .enpaz{color:var(--green);text-align:center;font-weight:600;font-size:14.5px;padding:18px 10px 6px}
  .pie-nota{color:var(--muted);font-size:12.5px;text-align:center;margin-top:14px}
  .micuenta-cifra{font-family:var(--display);font-weight:800;font-size:32px;letter-spacing:-.5px;
    line-height:1.1;font-variant-numeric:tabular-nums}
  .micuenta-desglose{color:var(--muted);font-size:13px;margin-top:3px}
  .micuenta-accion{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);
    margin-top:12px;padding-top:11px;font-size:14px}
  .micuenta-accion .texto{flex:1;min-width:0}
  .micuenta-accion .btn{flex:none}

  /* ---------- actionable home / sharing ---------- */
  .hero-mini{display:flex;align-items:center;gap:8px;padding:14px 2px 12px;color:var(--primary)}
  .hero-mini svg{width:24px;height:24px}
  .hero-mini .marca{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-.3px;color:var(--ink)}
  .estado-sync{color:var(--muted);font-size:12.5px;margin-top:10px}
  .saldo-card{display:flex;align-items:center;gap:10px}
  .saldo-card .centro{flex:1;min-width:0}
  .saldo-card .label{margin:0 0 1px}
  .saldo-card .cifra{font-family:var(--display);font-weight:800;font-size:24px;
    letter-spacing:-.4px;font-variant-numeric:tabular-nums;line-height:1.15}
  .btn-texto{background:none;border:none;color:var(--primary);font-weight:600;font-size:14.5px;cursor:pointer;padding:6px 4px}
  .previo{white-space:pre-wrap;overflow-wrap:break-word;background:var(--bg);border:1px solid var(--line);
    border-radius:11px;padding:12px 13px;font-size:13px;line-height:1.55;max-height:36dvh;overflow-y:auto}
  .historial-linea{color:var(--muted);font-size:12.5px;text-align:center;margin-top:14px}
  .centrado{display:block;margin:10px auto 0;text-align:center}

  /* ---------- tab bar ---------- */
  nav#tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:var(--card);border-top:1px solid var(--line);
    padding:6px 10px calc(8px + env(safe-area-inset-bottom));
  }
  .tabbar-in{max-width:480px;margin:0 auto;display:flex}
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--muted);
    font-size:11px;font-weight:600;padding:7px 4px 4px;cursor:pointer;position:relative;
  }
  .tab svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.7;
    stroke-linecap:round;stroke-linejoin:round}
  .tab.activa{color:var(--primary)}
  .tab .badge{
    position:absolute;top:3px;right:calc(50% - 24px);
    background:var(--coral);color:var(--onprimary);font-size:9.5px;font-weight:700;
    min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-variant-numeric:tabular-nums;
  }
  .tab .badge[hidden]{display:none}

  /* ---------- sheet ---------- */
  #velo{position:fixed;inset:0;background:var(--velo);z-index:60;opacity:0;
    pointer-events:none;transition:opacity .2s}
  #velo.abierto{opacity:1;pointer-events:auto}
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--card);
    border-radius:18px 18px 0 0;border-top:1px solid var(--line);
    padding:8px 20px calc(24px + env(safe-area-inset-bottom));
    max-width:480px;margin:0 auto;transform:translateY(105%);transition:transform .25s;
    max-height:85dvh;overflow-y:auto;
  }
  #sheet.abierto{transform:translateY(0)}
  .asa{width:36px;height:4px;border-radius:99px;background:var(--line);margin:6px auto 16px}
  .sheet-titulo{font-family:var(--display);font-size:20px;font-weight:700;margin:0 0 4px;text-wrap:balance}
  .sheet-sub{color:var(--muted);font-size:13.5px;margin:0 0 14px;line-height:1.5}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px}
  .pill{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
    background:var(--card);border-radius:999px;padding:6px 13px 6px 6px;
    font-size:13.5px;font-weight:600;cursor:pointer;
  }
  .pill .avatar{width:24px;height:24px;font-size:11px}
  .pill.on{border-color:var(--green);background:var(--greensoft)}
  .pill.off{opacity:.4}
  .pill.solo-texto{padding:6px 13px}
  .pill.on.pill-primary{border-color:var(--primary);background:var(--primarysoft)}
  .precio-input{display:flex;align-items:center;gap:10px}
  .precio-input input{font-size:24px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
  .precio-input .eur{font-size:19px;font-weight:600;color:var(--muted)}
  .sheet-botones{display:flex;gap:10px;margin-top:22px}
  .sheet-botones .btn{flex:1}
  .link-borrar{background:none;border:none;color:var(--coral);font-size:13.5px;
    font-weight:600;margin:16px auto 0;display:block;cursor:pointer}
  .opcion-menu{
    display:block;width:100%;background:var(--card);
    border:1px solid var(--line);border-radius:11px;
    font-size:14.5px;font-weight:600;padding:13px 14px;margin-bottom:8px;cursor:pointer;text-align:left;
  }
  .opcion-menu small{display:block;font-weight:400;color:var(--muted);font-size:12.5px;margin-top:2px}
  .nota{border:1px solid var(--line);border-left:3px solid var(--primary);
    border-radius:9px;padding:11px 13px;font-size:13px;color:var(--muted);line-height:1.5;margin-top:16px}

  /* ---------- toast ---------- */
  #toast{
    position:fixed;bottom:92px;left:50%;transform:translate(-50%,16px);z-index:70;
    background:var(--ink);color:var(--bg);font-size:13.5px;font-weight:500;
    padding:10px 17px;border-radius:10px;opacity:0;transition:.25s;pointer-events:none;
    max-width:86vw;text-align:center;
  }
  #toast.ver{opacity:1;transform:translate(-50%,0)}
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>

<button id="btnTema" type="button" aria-label="Cambiar entre modo claro y oscuro">
  <svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
</button>

<div id="app">
  <main id="vista"></main>
  <nav id="tabbar">
    <div class="tabbar-in">
      <button class="tab" data-tab="fiesta" type="button">
        <svg viewBox="0 0 48 48" stroke-width="3.4"><circle cx="24" cy="24" r="19"/><g stroke-linecap="round"><line x1="24" y1="24" x2="24" y2="5"/><line x1="24" y1="24" x2="42.1" y2="18.1"/><line x1="24" y1="24" x2="35.2" y2="39.4"/><line x1="24" y1="24" x2="12.8" y2="39.4"/><line x1="24" y1="24" x2="5.9" y2="18.1"/></g></svg>
        Fiesta</button>
      <button class="tab" data-tab="lista" type="button">
        <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>
        Lista</button>
      <button class="tab" data-tab="pena" type="button">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c.6-3 2.8-4.8 5.5-4.8s4.9 1.8 5.5 4.8"/><circle cx="17" cy="9" r="2.4"/><path d="M16 14.4c2.3.2 4 1.7 4.5 4.1"/></svg>
        Peña</button>
      <button class="tab" data-tab="cuentas" type="button">
        <svg viewBox="0 0 24 24"><path d="M4 7h13M17 7l-3-3M17 7l-3 3"/><path d="M20 17H7M7 17l3-3M7 17l3 3"/></svg>
        Cuentas<span class="badge" id="badgeCuentas" hidden></span></button>
    </div>
  </nav>
</div>

<div id="velo"></div>
<div id="sheet" role="dialog" aria-modal="true"></div>
<div id="toast" role="status"></div>

<script>
'use strict';
/* ================= state ================= */
const CLAVE = 'a-pachas-v1';
const CLAVES_VIEJAS = ['el-bote-proto-v2', 'el-bote-proto-v1'];
const CLAVE_TEMA = 'a-pachas-tema';
const API = '/api';
const ahora = () => Date.now();

// v3 -> v4: edit timestamps (`mod`) for conflict-safe merging, settled Bizums
// as {hecho,t,por} objects, and a deleted-id tombstone list. Accepts any old
// state source: localStorage, AP1/EB1 links, or the server itself.
// IDs are sanitized because they eventually get interpolated into DOM
// attributes; a poisoned state cannot smuggle a weird ID into HTML.
const ID_OK = /^[A-Za-z0-9_-]{1,40}$/;
const CLAVE_SALDADO_OK = /^[A-Za-z0-9_-]{1,40}>[A-Za-z0-9_-]{1,40}$/;
function migrar(o){
  if(!o) return o;
  o.v = 4;
  if(typeof o.fiesta === 'string') o.fiesta = {nombre:o.fiesta, fecha:null};
  if(!o.fiesta.mod) o.fiesta.mod = 0;
  // The date ends up in value="...": it is YYYY-MM-DD or nothing.
  if(o.fiesta.fecha != null && !/^\d{4}-\d{2}-\d{2}$/.test(o.fiesta.fecha)) o.fiesta.fecha = null;
  // The deployed app marked REAL migrated el-bote-proto parties as
  // ejemplo:true, and their AP1 links carry that forward. Only the real demo
  // fixture (factory p1..p5 IDs) may keep the flag; every other party must be
  // unlocked so it can go live.
  if(o.fiesta.ejemplo && !(o.gente || []).some(p => p && p.id === 'p1')) delete o.fiesta.ejemplo;
  o.gente = (o.gente || []).filter(p => p && typeof p.id === 'string' && ID_OK.test(p.id));
  o.gente.forEach((p,i) => {
    if(p.admin === undefined) p.admin = i < 2;
    if(!p.mod) p.mod = 0;
  });
  o.items = (o.items || []).filter(it => it && typeof it.id === 'string' && ID_OK.test(it.id));
  o.items.forEach(it => { if(!it.mod) it.mod = 0; });
  o.saldados = o.saldados || {};
  for(const k in o.saldados){
    if(!CLAVE_SALDADO_OK.test(k)){ delete o.saldados[k]; continue; }
    if(o.saldados[k] === true) o.saldados[k] = {hecho:true, t:0};
  }
  o.papelera = (o.papelera || []).filter(l => l && typeof l.id === 'string' && ID_OK.test(l.id));
  // Every tombstone carries `vio` (the version seen by the deleter). Ancient
  // tombstones without it inherit their deletion time, preserving old behavior.
  o.papelera.forEach(l => { if(l.vio == null) l.vio = l.t || 0; });
  return o;
}

function guardarLocal(jsonCompartido){
  // Snapshot of the shared state as stored. guardar() compares this to
  // distinguish real shared changes from purely local saves (tab, yo). Callers
  // that already have the serialization can pass it to avoid recalculating.
  if(S && S.remota) sync.compartidoActual = jsonCompartido || estadoJson();
  try{ localStorage.setItem(CLAVE, JSON.stringify(S)); }catch(e){}
}
// Real save: always to the phone, and if the party is live, to the server after
// a small delay so quick successive taps are batched.
// S.pendienteSubida is local and persisted; it remembers across sessions that
// there are unsent changes, so reopening does not confuse them with being
// up-to-date.
function guardar(){
  if(S && S.remota && !S.fiesta.ejemplo){
    const j = estadoJson();
    const esCambio = j !== sync.compartidoActual;                 // This save touched shared state.
    if(esCambio) sync.rechazado = false; // Real change: allow another upload attempt.
    const sinSubir = sync.subido !== null && j !== sync.subido;   // Differs from confirmed server state.
    if(esCambio || sinSubir){
      S.pendienteSubida = true;
      // Retrying the last server-rejected state without new changes only
      // repeats the 400 and toast.
      if(!sync.rechazado) programarSubida();
    }
    guardarLocal(j);
    return;
  }
  guardarLocal();
}

// New ID = prefix + timestamp + random component + counter. Randomness is
// required for live parties: two phones creating their first entity in the same
// millisecond would otherwise collide and merge into one.

  try {

    return b[0].toString(36);
  } catch(e){ return Math.random().toString(36).slice(2, 9); }
}

// saldados[k] can be true (legacy format) or {hecho,t,por,cents}. The mark
// stores the amount that was actually paid; if later accounts change the Bizum
// between the same pair, the new amount becomes pending again.
const claveBizum = b => b.de + '>' + b.a;
const hechoBizum = b => {
  const v = S.saldados[claveBizum(b)];
  if(v === true) return true; // Legacy mark without amount: preserve it.
  return !!(v && v.hecho && (v.cents == null || v.cents === b.cents));
};

// Last-edit stamp: cross-phone merging depends on this. It is monotonic against
// the edited entity, so even if this phone's clock moves backwards, a real edit
// always lands above the version and tombstone it overwrites.
function tocar(x){ x.mod = Math.max(ahora(), (x.mod || 0) + 1); x.modPor = S.yo || null; return x; }

// Protocol delete: remove from the collection and add an informed tombstone
// (`vio`), keeping a local tombstone cap because the server rejects runaway
// states.
function enterrar(coleccion, ent){
  S[coleccion] = S[coleccion].filter(x => x.id !== ent.id);
  S.papelera.push({id: ent.id, t: ahora(), vio: ent.mod || 0});
  if(S.papelera.length > 300) S.papelera = S.papelera.slice(-300);
}

const elItem = id => S && S.items.find(x => x.id === id);

// Remove deleted people from split lists. If an expense would be left with no
// consumers, fall back to "everyone" rather than breaking accounts. No new edit
// stamp: this is derived cleanup, not an edit, so merging never lets it
// overwrite something this phone has not seen.
function normalizarRepartos(items, gente){
  const vivos = new Set(gente.map(p => p.id));
  for(let i = 0; i < items.length; i++){
    const it = items[i];
    if(!it.consumen) continue;
    const vivosCons = it.consumen.filter(id => vivos.has(id));
    if(vivosCons.length !== it.consumen.length){
      items[i] = {...it, consumen: vivosCons.length ? vivosCons : null};
    }
  }
}

// Bizum marks cannot grow without bound or reference removed people; the server
// rejects states with more than 500 keys. Prune both while merging and while
// marking, because the normal single-phone path never merges.
// Deterministic: the same state prunes the same way on every phone.
function podarSaldados(saldados, gente){
  const vivos = new Set(gente.map(p => p.id));
  for(const k of Object.keys(saldados)){
    const par = k.split('>');
    if(!vivos.has(par[0]) || !vivos.has(par[1])) delete saldados[k];
  }
  const claves = Object.keys(saldados);
  if(claves.length > 400){
    claves.sort((x, y) => ((saldados[x].t || 0) - (saldados[y].t || 0)));
    for(const k of claves.slice(0, claves.length - 400)) delete saldados[k];
  }
}

// Parse price into cents using Spanish notation: comma decimals and dot
// thousands ("1.000" is one thousand euros, not one euro).
function precioACentimos(txt){
  let s = String(txt).trim().replace(/[€\s]/g,'');
  if(!s) return NaN;
  if(s.includes(',')) s = s.replace(/\./g,'').replace(',', '.');
  else if(/^\d{1,3}(\.\d{3})+$/.test(s)) s = s.replace(/\./g,'');
  if(!/^\d+(\.\d+)?$/.test(s)) return NaN;
  return Math.round(parseFloat(s)*100);
}

function haceCuanto(t){
  if(!t) return 'hace nada';
  const s = Math.max(0, Math.round((ahora() - t) / 1000));
  if(s < 45) return 'hace un momento';
  if(s < 3600) return `hace ${Math.round(s/60)} min`;
  if(s < 86400) return `hace ${Math.round(s/3600)} h`;
  return `hace ${Math.round(s/86400)} día${Math.round(s/86400)===1?'':'s'}`;
}

async function copiar(txt){
  try { await navigator.clipboard.writeText(txt); return true; }
  catch(e){
    try {
      const ta = document.createElement('textarea');
      ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      const ok = document.execCommand('copy');
      ta.remove(); return ok;
    } catch(e2){ return false; }
  }
}

// Live link: #F:<id>:<clave>. It intentionally lives in the hash so neither
// nginx nor Cloudflare sees the write key. AP1:/EB1: full-state links remain as
// local backups and compatibility with old links.
const RE_VIVO = /F:([a-z2-9]{6,}):([a-z2-9]{6,})/i;

function codigoFiesta(){
  // Whitelist through compartidoDe, which defines shared state. A new local
  // field can never accidentally leak into snapshot links.
  const limpio = {...compartidoDe(S), yo:null, tab:'fiesta'};
  // Cached old clients can also read AP1 links. Export saldados in their
  // legacy format: only completed keys set to true, because {hecho:false} would
  // look settled to them. Export settled marks according to CURRENT accounts;
  // a stale-amount mark no longer counts as done.
  limpio.saldados = {};
  cuentas().bizums.forEach(b => { if(hechoBizum(b)) limpio.saldados[claveBizum(b)] = true; });
  const json = JSON.stringify(limpio);
  const b64 = btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  return 'AP1:' + b64;
}
function enlaceFiesta(){
  if(S.remota) return location.origin + location.pathname + '#F:' + S.remota.id + ':' + S.remota.clave;
  return location.origin + location.pathname + '#' + codigoFiesta();
}
function decodificar(texto){
  const m = String(texto).match(/(?:AP1|EB1):([A-Za-z0-9_-]+)/);
  if(!m) return null;
  try {
    let b64 = m[1].replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    const obj = JSON.parse(decodeURIComponent(escape(atob(b64))));
    if(!obj || !obj.gente || !obj.items || !obj.fiesta) return null;
    obj.yo = null; obj.tab = 'fiesta'; obj.remota = null;
    return migrar(obj);
  } catch(e){ return null; }
}
// Before replacing the current party with another, leave a localStorage backup.
// Live parties still live on the server anyway.
function respaldarActual(){
  if(S && !S.fiesta.ejemplo && (S.items.length || S.gente.length > 1)){
    try{ localStorage.setItem(CLAVE + '-anterior', JSON.stringify(S)); }catch(e){}
  }
}
function aplicarImportado(obj){
  respaldarActual();
  resetSync();
  S = obj; guardarLocal(); pintar(); sheetIdentidad(true);
}
function importar(texto){
  const mv = String(texto).match(RE_VIVO);
  if(mv){
    cerrarSheet();
    abrirEnlaceVivo(mv[1].toLowerCase(), mv[2].toLowerCase());
    return true;
  }
  const obj = decodificar(texto);
  if(!obj) return false;
  // An old snapshot link must not silently disconnect a live party.
  if(S && S.remota && !S.fiesta.ejemplo){
    cerrarSheet();
    sheetConfirmar('¿Abrir la fiesta del enlace?',
      'Ese enlace lleva una copia congelada. Tu fiesta en vivo se queda a salvo: vuelves a ella con el enlace del grupo.',
      () => aplicarImportado(obj));
    return true;
  }
  aplicarImportado(obj);
  return true;
}

const sync = {
  subido: null,       // JSON of the last shared state confirmed by the server.
  compartidoActual: null, // JSON of shared state as currently saved locally.
  timer: null,
  subiendo: false,
  otraVez: false,     // A change arrived while an upload was in flight.
  pintarLuego: false, // New state exists but repaint is deferred.
  ultimo: 0,          // Last successful server contact.
  sinRed: false,
  avisado: false,
  rechazado: false,   // Server rejected state (400/413): do not retry blindly.
};

async function pedir(metodo, ruta, cuerpo){
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), 8000);
  try {
    const r = await fetch(API + ruta, {
      method: metodo,
      headers: cuerpo ? {'Content-Type':'application/json'} : undefined,
      body: cuerpo ? JSON.stringify(cuerpo) : undefined,
      cache: 'no-store',
      signal: ctl.signal,
    });
    let datos = null;
    try { datos = await r.json(); } catch(e){}
    return {status: r.status, cuerpo: datos};
  } finally { clearTimeout(t); }
}

// What travels to the server and in links: the party without local fields
// (yo, tab, remota). compartidoDe also canonicalizes key order because
// comparisons are JSON-based.
const compartidoDe = o => ({v:4, fiesta:o.fiesta, gente:o.gente, items:o.items,
  saldados:o.saldados, papelera:o.papelera});
const estadoCompartido = () => compartidoDe(S);
const estadoJson = () => JSON.stringify(estadoCompartido());

// Entity merge: latest edit wins by `mod`, and the tombstone list prevents
// deleted entities from coming back. A tombstone only buries an entity if it is
// newer than that entity's latest edit; if someone re-saves a purchase after
// someone else deleted it, the real payment survives and the losing tombstone is
// discarded. a is usually server state, b is local state.
function fusionar(a, b){
  const mod = x => (x && x.mod) || 0;
  // For two tombstones with the same ID, keep the one that saw the highest
  // version, not the latest wall-clock timestamp. A later blind delete cannot
  // degrade an informed one.
  const fuerza = l => l.vio != null ? l.vio : (l.t || 0);
  const pap = new Map();
  [...(a.papelera||[]), ...(b.papelera||[])].forEach(p => {
    const previa = pap.get(p.id);
    if(!previa || fuerza(p) > fuerza(previa) ||
       (fuerza(p) === fuerza(previa) && (p.t||0) > (previa.t||0))) pap.set(p.id, p);
  });
  // The tombstone stores the version seen by the deleter (`vio`, normalized in
  // migrar). It can only bury what it knew. A blind delete cannot remove a
  // purchase saved in a revision it never downloaded.
  const enterrado = x => {
    const l = pap.get(x.id);
    return !!l && fuerza(l) >= mod(x);
  };
  const mezcla = (la, lb) => {
    const enA = new Map(la.map(x=>[x.id,x]));
    const enB = new Map(lb.map(x=>[x.id,x]));
    const res = [];
    for(const x of lb) if(!enA.has(x.id) && !enterrado(x)) res.push(x);
    for(const x of la){
      const y = enB.get(x.id);
      const gana = y && mod(y) > mod(x) ? y : x;
      if(!enterrado(gana)) res.push(gana);
    }
    return res;
  };
  const saldados = {...a.saldados};
  for(const k in (b.saldados||{})){
    const va = saldados[k], vb = b.saldados[k];
    if(!va || ((vb && vb.t) || 0) > ((va && va.t) || 0)) saldados[k] = vb;
  }
  const gente = mezcla(a.gente, b.gente);
  const items = mezcla(a.items, b.items);
  // Person-deletion cleanup is derived here, not written at delete time. A
  // rewrite from a stale view would overwrite unseen edits. First: a payer of a
  // surviving expense cannot disappear because their credit would vanish; and
  // if removing someone would leave an expense with no consumers, recover them.
  const presentes = new Set(gente.map(p => p.id));
  const candidatos = new Map();
  [...(a.gente||[]), ...(b.gente||[])].forEach(p => {
    const prev = candidatos.get(p.id);
    if(!prev || mod(p) > mod(prev)) candidatos.set(p.id, p);
  });
  const resucitar = new Set();
  for(const it of items){
    if(it.compradorId && !presentes.has(it.compradorId)) resucitar.add(it.compradorId);
    if(it.consumen && it.consumen.length && it.consumen.every(id => !presentes.has(id))){
      it.consumen.forEach(id => resucitar.add(id));
    }
  }
  for(const id of resucitar){
    if(!presentes.has(id) && candidatos.has(id)){
      gente.push(candidatos.get(id));
      presentes.add(id);
    }
  }
  // The group cannot become empty. Two key holders deleting in parallel can bury
  // everyone while each local guard passes on its own phone. That is never the
  // intent, so restore the lowest ID deterministically.
  if(!gente.length && candidatos.size){
    const superviviente = [...candidatos.values()].sort((x,y) => x.id < y.id ? -1 : 1)[0];
    gente.push(superviviente);
    presentes.add(superviviente.id);
  }
  // The admin role cannot disappear. If two admins demote each other at the
  // same time, merging would leave nobody able to fix the party. The lowest ID
  // inherits the role deterministically.
  if(gente.length && !gente.some(p => p.admin)){
    [...gente].sort((x,y) => x.id < y.id ? -1 : 1)[0].admin = true;
  }
  // Once the people set is settled, including resurrections and fallback
  // restores, remove people whose deletion consolidated from split lists.
  normalizarRepartos(items, gente);
  // Prune saldados after resurrections so settled marks for restored people are
  // not deleted and shown as pending again.
  podarSaldados(saldados, gente);
  const vivos = new Set([...gente, ...items].map(x => x.id));
  return {
    v: 4,
    fiesta: mod(b.fiesta) > mod(a.fiesta) ? b.fiesta : a.fiesta,
    gente,
    items,
    saldados,
    // Drop tombstones that lost to a newer edit. The cap removes the oldest
    // tombstones, not the most recently arrived ones.
    papelera: [...pap.values()].filter(l => !vivos.has(l.id))
      .sort((x,y)=>(x.t||0)-(y.t||0)).slice(-300),
  };
}

function adoptar(c){
  S.v = 4; S.fiesta = c.fiesta; S.gente = c.gente; S.items = c.items;
  S.saldados = c.saldados; S.papelera = c.papelera;
  if(S.yo && !persona(S.yo)) S.yo = null;
}

function alDia(){
  sync.ultimo = ahora(); sync.sinRed = false; sync.avisado = false;
  refrescarSync();
}
function sinRed(){
  sync.sinRed = true;
  if(!sync.avisado && S && S.remota){
    sync.avisado = true;
    toast('Sin red. Tus cambios quedan apuntados y se subirán solos.');
  }
  refrescarSync();
}
function textoSync(){
  if(!S) return '';
  if(S.fiesta.ejemplo) return 'Fiesta de ejemplo · solo en este móvil';
  if(!S.remota) return 'Solo en este móvil';
  if(sync.rechazado) return 'En vivo · hay cambios que no se han podido subir';
  if(sync.sinRed) return 'Sin red · los cambios se subirán solos';
  if(!sync.ultimo) return 'En vivo · poniéndose al día…';
  return 'En vivo con la peña · al día ' + haceCuanto(sync.ultimo);
}
function refrescarSync(){
  const el = $('#syncEstado');
  if(!el) return;
  el.textContent = textoSync();
  el.classList.toggle('vivo',
    !!(S && S.remota && !S.fiesta.ejemplo && !sync.sinRed && !sync.rechazado));
}

const sheetAbierto = () => $('#sheet').classList.contains('abierto');
// Do not repaint under someone's fingers: open sheet or half-written text.
// Inputs from a closed sheet do not count, even though their DOM remains.
function ocupado(){
  const a = document.activeElement;
  if(a && (a.tagName === 'INPUT' || a.tagName === 'TEXTAREA') &&
     (!$('#sheet').contains(a) || sheetAbierto())) return true;
  return [...document.querySelectorAll('#vista input, #vista textarea')].some(el => el.value);
}
// Repaint immediately if possible; otherwise repaint once the user lets go.
function pintarOLuego(){
  if(!sheetAbierto() && !ocupado()){ sync.pintarLuego = false; pintar(); }
  else sync.pintarLuego = true;
}

function programarSubida(){
  clearTimeout(sync.timer);
  sync.timer = setTimeout(subir, 600);
}

async function subir(){
  if(!S || !S.remota || S.fiesta.ejemplo || sync.rechazado) return;
  // Without a server baseline and without truly pending changes, a PUT would be
  // blind churn. Let the first poll seed sync.subido first.
  if(sync.subido === null && !S.pendienteSubida) return;
  if(sync.subiendo){ sync.otraVez = true; return; }
  sync.subiendo = true;
  try {
    for(let intento = 0; intento < 4; intento++){
      const fiestaPedida = S.remota.id;
      const estado = estadoCompartido();
      const json = JSON.stringify(estado);
      if(json === sync.subido){
        // Everything is confirmed; clear the persisted pending mark too.
        if(S.pendienteSubida){ S.pendienteSubida = false; guardarLocal(json); }
        break;
      }
      const r = await pedir('PUT', '/fiestas/' + fiestaPedida,
        {clave: S.remota.clave, rev: S.remota.rev, estado});
      // If the party changed during the request, this response is irrelevant.
      if(!S || !S.remota || S.remota.id !== fiestaPedida) break;
      if(r.status === 200){
        S.remota.rev = r.cuerpo.rev; sync.subido = json;
        if(json === estadoJson()) S.pendienteSubida = false;
        guardarLocal(); alDia();
        break;
      } else if(r.status === 409 && r.cuerpo && r.cuerpo.estado){
        // Merge against the CURRENT shared state, not the pre-PUT snapshot. Edits
        // made while the request was in flight must not be lost.
        adoptar(fusionar(migrar(r.cuerpo.estado), estadoCompartido()));
        S.remota.rev = r.cuerpo.rev;
        guardarLocal();
        pintarOLuego();
        // The next loop uploads the merged state.
      } else if(r.status === 404){
        desconectarRemota('Esa fiesta ya no está en vivo. Sigues con la copia de tu móvil.');
        break;
      } else if(r.status === 403){
        desconectarRemota('Este enlace ya no puede editar la fiesta. Sigues con la copia de tu móvil.');
        break;
      } else if(r.status === 429){
        break; // Server throttle; the interval will retry soon.
      } else if(r.status === 400 || r.status === 413){
        // The server rejects this state, likely shape or size. This is not a
        // network issue, and blind retries will not fix it.
        sync.rechazado = true;
        toast('Los últimos cambios no han podido subir. De momento se quedan en este móvil.');
        refrescarSync();
        break;
      } else { sinRed(); break; }
    }
  } catch(e){ sinRed(); }
  sync.subiendo = false;
  if(sync.otraVez){ sync.otraVez = false; programarSubida(); }
}

async function bajar(){
  if(!S || !S.remota || S.fiesta.ejemplo) return;
  const fiestaPedida = S.remota.id;
  try {
    const r = await pedir('GET', '/fiestas/' + fiestaPedida + '?rev=' + S.remota.rev);
    // If the party changed during the request, this response belongs to the old one.
    if(!S || !S.remota || S.remota.id !== fiestaPedida) return;
    if(r.status === 204){
      // The server is at our revision. If no pending local changes exist, local
      // state is the uploaded state; this avoids churn PUTs on reopen.
      if(sync.subido === null && !S.pendienteSubida) sync.subido = estadoJson();
      alDia(); return;
    }
    if(r.status === 200 && r.cuerpo && r.cuerpo.estado){
      // Stale response: one of our PUTs already advanced the revision. Ignore it
      // to avoid a rev/state bounce and re-upload loop.
      if(!(r.cuerpo.rev > S.remota.rev)){ alDia(); return; }
      const antes = estadoJson();
      const remoto = migrar(r.cuerpo.estado);
      adoptar(fusionar(remoto, estadoCompartido()));
      S.remota.rev = r.cuerpo.rev;
      const despues = estadoJson();
      if(despues === JSON.stringify(compartidoDe(remoto))){
        sync.subido = despues;
        S.pendienteSubida = false;
      } else {
        S.pendienteSubida = true;
        programarSubida(); // The merge has local changes the server has not seen.
      }
      alDia();
      guardarLocal(despues);
      if(despues !== antes) pintarOLuego();
    } else if(r.status === 404){
      desconectarRemota('Esa fiesta ya no está en vivo. Sigues con la copia de tu móvil.');
    } else if(r.status === 429 || r.status >= 500){
      sinRed(); // Saturation or outage: same honest treatment as no coverage.
    }
  } catch(e){ sinRed(); }
}

let creandoRemota = false; // A double tap must not create two parties.
async function crearRemota(){
  if(!S || S.fiesta.ejemplo || S.remota) return !!(S && S.remota); // The demo never uploads.
  if(creandoRemota) return false;
  creandoRemota = true;
  const fiestaLocal = S; // If S changes during the POST, the response is stale.
  const estado = estadoCompartido();
  const json = JSON.stringify(estado); // Snapshot of what we actually send.
  try {
    const r = await pedir('POST', '/fiestas', {estado});
    if(S !== fiestaLocal) return false;
    if(r.status === 201 && r.cuerpo && r.cuerpo.id){
      resetSync();
      S.remota = {id: r.cuerpo.id, clave: r.cuerpo.clave, rev: r.cuerpo.rev};
      sync.subido = json;
      // Upload edits made while the POST was in flight.
      if(estadoJson() !== json){ S.pendienteSubida = true; programarSubida(); }
      else S.pendienteSubida = false;
      guardarLocal(); alDia();
      return true;
    }
  } catch(e){}
  finally { creandoRemota = false; }
  return false;
}

function desconectarRemota(msg){
  S.remota = null;
  resetSync();
  guardarLocal(); toast(msg);
  pintarOLuego();
}

async function activarVivo(){
  if(S.remota) return sheetCompartir('invitar');
  if(creandoRemota) return; // Already in progress, likely a double tap.
  const btn = $('#btnPonerVivo');
  if(btn) btn.disabled = true;
  if(await crearRemota()){
    pintar(); sheetCompartir('invitar');
  } else {
    if(btn) btn.disabled = false;
    toast('Ahora mismo no hay manera (¿sin red?). La fiesta sigue en tu móvil; prueba luego.');
  }
}

async function abrirEnlaceVivo(id, clave){
  const r = await pedir('GET', '/fiestas/' + id).catch(() => ({status: 0}));
  if(r.status !== 200 || !r.cuerpo || !r.cuerpo.estado){
    toast(r.status === 404
      ? 'Ese enlace ya no lleva a ninguna fiesta.'
      : 'No se ha podido abrir la fiesta del enlace. ¿Hay red?');
    pintar();
    return false;
  }
  const remoto = migrar(r.cuerpo.estado);
  const mismo = S && S.remota && S.remota.id === id;
  if(!mismo) respaldarActual();
  const yo = mismo ? S.yo : null;
  // If this is already the open party, merge pending local state instead of
  // overwriting it.
  const base = mismo ? fusionar(remoto, estadoCompartido()) : remoto;
  resetSync();
  S = {...base, yo, tab:'fiesta', remota:{id, clave, rev:r.cuerpo.rev}};
  // The opener may have been removed from the group; do not let them act as a
  // ghost participant.
  if(S.yo && !persona(S.yo)) S.yo = null;
  const json = estadoJson();
  if(json === JSON.stringify(compartidoDe(remoto))){
    sync.subido = json;
    S.pendienteSubida = false;
  } else {
    sync.subido = JSON.stringify(compartidoDe(remoto));
    S.pendienteSubida = true;
    programarSubida();
  }
  guardarLocal(json); alDia(); pintar();
  if(!S.yo) sheetIdentidad(true);
  return true;
}

/* ================= account calculation ================= */
function cuentas(){
  const pagado = {}, debe = {};
  S.gente.forEach(p => { pagado[p.id]=0; debe[p.id]=0; });
  let total = 0;
  for(const it of S.items){
    if(it.estado !== 'comprada' || !it.precio) continue;
    total += it.precio;
    if(pagado[it.compradorId] !== undefined) pagado[it.compradorId] += it.precio;
    const cons = consumidores(it).filter(id => debe[id] !== undefined);
    if(!cons.length) continue;
    const base = Math.floor(it.precio / cons.length);
    let resto = it.precio - base*cons.length;
    for(const id of cons){ debe[id] += base + (resto-- > 0 ? 1 : 0); }
  }
  const saldo = {};
  S.gente.forEach(p => saldo[p.id] = pagado[p.id] - debe[p.id]);

  const deudores = S.gente.filter(p=>saldo[p.id]<0).map(p=>({id:p.id, v:-saldo[p.id]})).sort((a,b)=>b.v-a.v);
  const acreedores = S.gente.filter(p=>saldo[p.id]>0).map(p=>({id:p.id, v:saldo[p.id]})).sort((a,b)=>b.v-a.v);
  const bizums = [];
  let i=0, j=0;
  while(i<deudores.length && j<acreedores.length){
    const m = Math.min(deudores[i].v, acreedores[j].v);
    if(m>0) bizums.push({de:deudores[i].id, a:acreedores[j].id, cents:m});
    deudores[i].v -= m; acreedores[j].v -= m;
    if(deudores[i].v===0) i++;
    if(acreedores[j].v===0) j++;
  }
  return {total, pagado, debe, saldo, bizums};
}

function abrirSheet(html, bloqueado){
  $('#sheet').innerHTML = '<div class="asa"></div>' + html;

}
function cerrarSheet(){
  $('#sheet').classList.remove('abierto');
  $('#velo').classList.remove('abierto');
  // Without this, a sheet input keeps focus and leaves the keyboard open.
  const a = document.activeElement;
  if(a && a.blur && $('#sheet').contains(a)) a.blur();
  if(sync.pintarLuego) pintarOLuego();
}

}

/* --- expense: direct, mark bought, or edit in one sheet --- */
function sheetGasto(itemId){
  const it = itemId ? elItem(itemId) : null;
  if(itemId && !it){ pintar(); return toast('Esa ya no está en la lista.'); }
  const directo = !it;
  const editando = !!(it && it.estado === 'comprada');
  let tocoConsumidores = false; // If pills are never touched, "everyone" means everyone.
  const marcados = new Set(it ? consumidores(it) : S.gente.map(p=>p.id));
  let compradorSel = editando ? it.compradorId : ((it && it.pilladorId) || S.yo);
  if(!persona(compradorSel)) compradorSel = persona(S.yo) ? S.yo : null;

  const pillsCons = S.gente.map(p =>
    pillPersona(p, 'cons', marcados.has(p.id)?'on':'off')).join('');
  const pillsComp = S.gente.map(p =>
    pillPersona(p, 'comp', 'pill-primary ' + (p.id===compradorSel?'on':''))).join('');

  let historial = '';
  if(editando){
    const creador = it.creadoPor && persona(it.creadoPor);
    const editor = it.modPor && it.modPor !== it.creadoPor && persona(it.modPor);
    const trozos = [];
    if(creador) trozos.push(`La apuntó ${esc(creador.nombre)}${it.creadoEn ? ' ' + haceCuanto(it.creadoEn) : ''}`);
    if(editor) trozos.push(`tocada por ${esc(editor.nombre)} ${haceCuanto(it.mod)}`);
    if(trozos.length) historial = `<div class="historial-linea">${trozos.join(' · ')}</div>`;
  }

  const titulo = directo ? 'Apuntar un gasto' : esc(it.nombre);
  const sub = directo ? 'Qué fue, cuánto costó y quiénes lo catan.'
    : editando ? 'Corrige lo que haga falta.'
    : 'Apunta lo que ha costado y quién la cata.';
  const precioIni = editando && it.precio ? (it.precio/100).toFixed(2).replace('.',',') : '';
  abrirSheet(`
    <h2 class="sheet-titulo">${titulo}</h2>
    <p class="sheet-sub">${sub}</p>
    <label class="label" for="inConcepto" style="margin-top:0">Qué</label>
    <input type="text" id="inConcepto" placeholder="Hielo, pan, el bar…" maxlength="40"
      autocomplete="off" value="${it ? esc(it.nombre) : ''}">
    <label class="label" for="inPrecio">Precio</label>
    <div class="precio-input">
      <input type="tel" id="inPrecio" inputmode="decimal" placeholder="0,00" value="${precioIni}" autocomplete="off">
      <span class="eur">€</span>
    </div>
    <span class="label">Pagó</span>
    <div class="pills">${pillsComp}</div>
    <span class="label">¿Quiénes lo catan?</span>
    <div class="pills">${pillsCons}</div>
    <div class="sheet-botones">
      <button class="btn btn-borde" id="btnCancelar" type="button">Cancelar</button>
      <button class="btn btn-green" id="btnGuardarCompra" type="button">
        ${editando ? 'Guardar' : directo ? 'Apuntar el gasto' : 'Apuntar la compra'}</button>
    </div>
    ${editando ? '<button class="link-borrar" id="btnBorrarItem" type="button">Borrar esta compra</button>' : ''}
    ${historial}
  `);
  document.querySelectorAll('[data-cons]').forEach(b => b.onclick = () => {
    const id = b.dataset.cons;
    tocoConsumidores = true; // No longer an intentional "everyone" split.
    if(marcados.has(id)){
      if(marcados.size === 1) return toast('Alguien lo catará, digo yo.');
      marcados.delete(id);
    } else marcados.add(id);
    b.classList.toggle('on', marcados.has(id));
    b.classList.toggle('off', !marcados.has(id));
  });
  document.querySelectorAll('[data-comp]').forEach(b => b.onclick = () => {
    compradorSel = b.dataset.comp;
    document.querySelectorAll('[data-comp]').forEach(x =>
      x.classList.toggle('on', x.dataset.comp === compradorSel));
  });
  $('#btnCancelar').onclick = cerrarSheet;
  $('#btnGuardarCompra').onclick = () => {
    const nombre = $('#inConcepto').value.trim();
    if(!nombre) return toast('Pon qué fue.');
    const val = precioACentimos($('#inPrecio').value);
    if(isNaN(val) || val<=0) return toast('Ponle precio, que gratis no fue.');
    if(val > 100000000) return toast('¿' + eur(val) + '? Repasa ese precio, anda.');
    if(!persona(compradorSel)) return toast('¿Quién lo pagó?');
    // The group may have changed while the sheet was open. A removed ID in
    // consumen would resurrect that person in the next merge. If the user never
    // touched the pills from an "everyone" starting point, the intent is still
    // EVERYONE, so a new joiner during the sheet is included.
    let consumen;
    if(!tocoConsumidores && (!it || !it.consumen)){
      consumen = null;
    } else {
      const marcadosVivos = [...marcados].filter(id => persona(id));
      if(!marcadosVivos.length){
        return abortarSheet('La peña ha cambiado por debajo: revisa quiénes lo catan.');
      }
      consumen = marcadosVivos.length === S.gente.length ? null : marcadosVivos;
    }
    if(directo){
      if(S.items.length >= 500) return toast('La lista no da pa más (500 cosas). Quita algo primero.');
      S.items.unshift(tocar({id:nuevoId('i'), nombre, estado:'comprada', precio:val,
        compradorId:compradorSel, consumen,
        creadoEn:ahora(), creadoPor:S.yo || null}));
      toast('Apuntado. Las cuentas ya lo saben.');
    } else {
      // Find by ID again: the party may have refreshed while the sheet was
      // open. Permission is revalidated before anything else, including the
      // resurrection path, so someone who lost admin cannot revive another
      // person's purchase.
      let vivo = S.items.find(x=>x.id===itemId);
      const objetivo = vivo || it;
      if(editando && !soyAdmin() && objetivo.compradorId !== S.yo){
        return abortarSheet('Esa compra acaba de cambiar de manos: solo quien la pagó o la llave pueden tocarla.');
      }
      if(vivo && !editando && vivo.estado === 'comprada'){
        // Someone else bought it while the sheet was open; do not overwrite
        // their payment with this form.
        return abortarSheet('Alguien la ha apuntado ya como comprada: revísala antes de corregirla.');
      }
      if(!vivo){
        // If someone else deleted it, add it again: the payment was real.
        vivo = it;
        S.items.unshift(vivo);
        S.papelera = S.papelera.filter(t=>t.id!==itemId);
      }
      vivo.nombre = nombre;
      vivo.precio = val;
      vivo.consumen = consumen;
      vivo.compradorId = compradorSel;
      tocar(vivo);
      if(!editando){
        vivo.estado = 'comprada';
        delete vivo.pilladorId;
        toast('Apuntada. Las cuentas ya lo saben.');
      } else {
        toast('Guardado');
      }
    }
    guardar(); cerrarSheet(); pintar();
  };
  const del = $('#btnBorrarItem');
  if(del) del.onclick = () => {
    sheetConfirmar('¿Borrar esta compra?',
      `«${it.nombre}» (${eur(it.precio||0)}) se quita de la lista y de las cuentas.`, () => {
        // Revalidate against live state; the party may have changed underneath.
        const vivo = elItem(itemId);
        if(!vivo){ pintar(); return toast('Ya no está: alguien la ha quitado antes.'); }
        if(!soyAdmin() && vivo.compradorId !== S.yo){
          pintar(); return toast('Esa compra ha cambiado de manos: solo quien la pagó o la llave pueden borrarla.');
        }
        enterrar('items', vivo);
        guardar(); pintar(); toast('Fuera de la lista');
      });
  };
  setTimeout(()=>$(directo ? '#inConcepto' : '#inPrecio').focus(), 250);
}

/* --- assign, admins only --- */
function sheetAsignar(itemId){

    // must not be confused with that, because it would release the item.
    if(b.dataset.asig && !quien) return abortarSheet('Esa persona ya no está en la peña.');

    else { vivo.estado='pendiente'; delete vivo.pilladorId; toast('Suelta. A ver quién se la pide ahora.'); }
    tocar(vivo);
    guardar(); cerrarSheet(); pintar();
  });
}

/* --- person detail --- */
function sheetPersona(pid){
  const p = persona(pid); if(!p) return;
  const c = cuentas();
  const asignadas = S.items.filter(i=>i.estado==='pillada' && i.pilladorId===pid);
  const compras = S.items.filter(i=>i.estado==='comprada' && i.compradorId===pid);
  const esYo = pid === S.yo;
  const puedoGestionar = soyAdmin() && !esYo;

  const listaAsig = asignadas.length
    ? asignadas.map(i=>`<li>${esc(i.nombre)}</li>`).join('')
    : '<li style="color:var(--muted)">Nada pendiente</li>';

  const s = c.saldo[pid] || 0;
  const saldoTxt = s === 0 ? 'está en paz' : s > 0 ? `le deben ${eur(s)}` : `debe ${eur(-s)}`;

  abrirSheet(`
    <h2 class="sheet-titulo">${esc(p.nombre)}${p.admin?' '+LLAVE:''}${esYo?' <span class="chip-estado chip-primary">tú</span>':''}</h2>
    <p class="sheet-sub">Ha pagado <strong>${eur(c.pagado[pid]||0)}</strong> en ${compras.length} compra${compras.length===1?'':'s'} ·
      le tocaba ${eur(c.debe[pid]||0)} · ${saldoTxt}.</p>
    <span class="label">Le toca traer</span>
    <ul style="margin:0 0 6px;padding-left:20px;font-size:14px;line-height:1.7">${listaAsig}</ul>
    ${!esYo ? `<button class="btn btn-borde btn-mini" id="btnRecordar" type="button" style="margin-top:6px">Mandarle un recordatorio</button>` : ''}
    ${puedoGestionar ? `
      <span class="label">Gestión</span>
      <button class="opcion-menu" id="btnToggleAdmin" type="button">
        ${p.admin ? 'Quitarle la llave' : 'Darle la llave (admin)'}
        <small>Los de la llave asignan cosas, corrigen precios y gestionan la peña.</small>
      </button>
      <button class="opcion-menu" id="btnEliminar" type="button">
        Quitar de la peña
        <small>Solo si no tiene compras apuntadas.</small>
      </button>` : ''}
  `);
  const rec = $('#btnRecordar');
  if(rec) rec.onclick = () => {
    if(!persona(pid)) return abortarSheet('Esa persona ya no está en la peña.');
    sheetCompartir('persona', pid);
  };
  // Handlers re-find by ID and reconfirm admin status; the party may have
  // merged underneath while the sheet was open.
  const tog = $('#btnToggleAdmin');
  if(tog) tog.onclick = () => {
    if(!exigirLlave()) return;
    const q = persona(pid);
    if(!q) return abortarSheet('Esa persona ya no está en la peña.');
    if(q.admin && numAdmins() === 1) return toast('Alguien tiene que quedarse con la llave');
    q.admin = !q.admin;
    tocar(q);
    guardar(); cerrarSheet(); pintar();
    toast(q.admin ? q.nombre + ' tiene la llave' : q.nombre + ' ya no tiene la llave');
  };
  const eli = $('#btnEliminar');
  if(eli) eli.onclick = () => {
    if(!exigirLlave()) return;
    const q = persona(pid);
    if(!q) return abortarSheet('Esa persona ya no está en la peña.');
    if(S.items.some(i=>i.estado==='comprada' && i.compradorId===pid))
      return toast('Tiene compras apuntadas: reasígnalas antes');
    // If this person is the sole explicit consumer of a purchase, removing them
    // would leave consumen empty, which means "everyone"; the expense would
    // silently reallocate itself.
    if(S.items.some(i=>i.estado==='comprada' && i.consumen &&
        i.consumen.length === 1 && i.consumen[0] === pid))
      return toast('Hay compras que solo cata esa persona: corrígelas antes');
    if(q.admin && numAdmins() === 1) return toast('Alguien tiene que quedarse con la llave');
    // Do NOT rewrite this person's items with a new stamp here. Their claims
    // become orphaned; the UI treats them as "unowned", and splits are cleaned
    // by the derived pass. The same pass runs during merge and only applies if
    // the deletion truly consolidates. If the person is resurrected because they
    // bought something this phone had not seen, their shares remain intact.
    enterrar('gente', q);
    normalizarRepartos(S.items, S.gente);
    guardar(); cerrarSheet(); pintar();
    toast(q.nombre + ' ya no está en la peña');
  };
}

/* --- share with the group: moment-specific messages --- */
function mensajeCompartir(tipo, pid){
  const enlace = enlaceFiesta();
  const n = S.fiesta.nombre;
  if(tipo === 'invitar'){
    return `A pachas con los gastos de «${n}».\n` +
      `Entra, di quién eres y apunta lo que pilles:\n${enlace}`;
  }
  if(tipo === 'lista'){
    const pend = S.items.filter(itemSinDueno);
    return `Faltan cosas pa «${n}»:\n` +
      pend.map(i=>'· ' + i.nombre).join('\n') +
      `\n\nQuien pueda, que se lo pida aquí:\n${enlace}`;
  }
  if(tipo === 'cuentas'){
    const c = cuentas();
    const pendientes = bizumsPendientes(c);
    const lineas = [`Cuentas de «${n}» — A Pachas`,
      `Total: ${eur(c.total)} entre ${S.gente.length}`, ''];
    if(!c.bizums.length){
      lineas.push('Cuentas en paz. Ni pa ti ni pa mí.');
    } else {
      c.bizums.forEach(b => lineas.push(
        (hechoBizum(b) ? '✓ ' : '· ') +
        persona(b.de).nombre + ' → ' + persona(b.a).nombre + ': ' + eur(b.cents)));
      lineas.push('');
      lineas.push(pendientes.length
        ? 'Marca el tuyo cuando lo hagas:' : 'Todo saldado. Cuentas claras y el chocolate espeso.');
    }
    lineas.push(enlace);
    return lineas.join('\n');
  }
  if(tipo === 'persona'){
    const p = persona(pid);
    if(!p) return enlace; // Removed while the sheet was open.
    const c = cuentas();
    const asignadas = S.items.filter(i=>i.estado==='pillada' && i.pilladorId===pid);
    const lineas = [`${p.nombre}, pa «${n}»:`];
    if(asignadas.length){
      lineas.push('');
      lineas.push('Te toca traer:');
      asignadas.forEach(i => lineas.push('· ' + i.nombre));
    }
    const debe = bizumsPendientes(c).filter(b => b.de === pid);
    const leDeben = bizumsPendientes(c).filter(b => b.a === pid);
    if(debe.length || leDeben.length){
      lineas.push('');
      lineas.push('De cuentas te sale:');
      debe.forEach(b => lineas.push(`· Bizum de ${eur(b.cents)} a ${persona(b.a).nombre}`));
      leDeben.forEach(b => lineas.push(`· ${persona(b.de).nombre} te debe ${eur(b.cents)}`));
    }
    if(!asignadas.length && !debe.length && !leDeben.length){
      lineas.push('nada pendiente. Estás al día, máquina.');
    }
    lineas.push('');
    lineas.push('Lo tienes aquí:');
    lineas.push(enlace);
    return lineas.join('\n');
  }
  return enlace;
}

async function sheetCompartir(tipo, pid){
  // The demo is not shareable: its demo flag would leave the receiver with a
  // party that can never go live.
  if(S.fiesta.ejemplo) return toast('La fiesta de ejemplo no se comparte: monta la tuya, que es un momento.');
  // If there are unsent changes, make one last push before composing the
  // message. Cap it so offline sharing does not hang for the full timeout.
  if(S.remota && S.pendienteSubida && !S.fiesta.ejemplo){
    clearTimeout(sync.timer);
    await Promise.race([subir(), new Promise(res => setTimeout(res, 1500))]);
  }
  const txt = mensajeCompartir(tipo, pid);
  const puedeVivo = !S.remota && !S.fiesta.ejemplo;
  // If something is still unsent, tell the sharer. A live link shows server
  // state, not this phone's unsent local state.
  const avisoPendiente = S.remota && S.pendienteSubida
    ? `<div class="nota">Hay cambios tuyos aún sin subir (¿sin red?). Quien abra
      el enlace no los verá hasta que se suban solos.</div>` : '';
  // In local mode the link embeds the whole party. The preview abbreviates it;
  // the copied/shared message keeps the full link.
  const vista = txt.replace(/(#(?:AP1|EB1):)[A-Za-z0-9_-]{24,}/g,
    '$1… (enlace largo: lleva dentro la copia de la fiesta)');
  abrirSheet(`
    <h2 class="sheet-titulo">Mandar al grupo</h2>
    <p class="sheet-sub">Así queda el mensaje:</p>
    <div class="previo">${esc(vista)}</div>
    ${avisoPendiente}
    ${puedeVivo ? `<div class="nota">Esta fiesta va solo en este móvil: el enlace lleva una copia
      congelada. Ponla en vivo y todos apuntarán en la misma.</div>
      <button class="btn btn-soft btn-block" id="btnVivoDesdeCompartir" type="button"
        style="margin-top:10px">Ponerla en vivo primero</button>` : ''}
    <div class="sheet-botones">
      <button class="btn btn-borde" id="btnCopiarMsg" type="button">Copiar</button>
      <button class="btn btn-green" id="btnWhatsAppMsg" type="button">WhatsApp</button>
    </div>
    ${navigator.share ? '<button class="link-quieto centrado" id="btnOtraApp" type="button">Mandar con otra app</button>' : ''}
  `);
  $('#btnCopiarMsg').onclick = async () => {
    const ok = await copiar(txt);
    toast(ok ? 'Copiado. Pégalo en el grupo.' : 'No se ha podido copiar');
    if(ok) cerrarSheet();
  };
  $('#btnWhatsAppMsg').onclick = () => {
    window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank', 'noopener');
    cerrarSheet();
  };
  const vivo = $('#btnVivoDesdeCompartir');
  if(vivo) vivo.onclick = async () => {
    vivo.disabled = true;
    if(await crearRemota()){ pintar(); sheetCompartir(tipo, pid); }
    else { vivo.disabled = false; toast('Ahora mismo no hay manera (¿sin red?). Prueba luego.'); }
  };
  const otra = $('#btnOtraApp');
  if(otra) otra.onclick = async () => {
    try { await navigator.share({text: txt}); cerrarSheet(); } catch(e){}
  };
}

      return toast('Esa fecha no cuadra: ponla normal o déjala en blanco.');
    const btn = $('#btnCrearFiesta');
    btn.disabled = true;
    const pid = nuevoId('p');
    respaldarActual();
    S = {
      v:4,
      fiesta:{nombre, fecha: fechaNueva || null, mod:ahora()},
      yo: pid, tab:'fiesta', remota: null,
      gente:[{id:pid, nombre:tu, admin:true, mod:ahora()}],
      items:[], saldados:{}, papelera:[],
    };
    // Save to the phone immediately. If the POST hangs and the user closes the
    // app, the party still exists locally.
    guardarLocal();

    ${!total ? '<div class="vacio">La lista está vacía.<br>Apunta lo primero que haga falta.</div>'
      : porComprar.map(cardItem).join('')
        + (sinDueno ? `<div style="text-align:center;margin:2px 0 10px">
            <button class="link-quieto" id="btnMandarLista" type="button">Mandar lo que falta al grupo</button>
          </div>` : '')
        + (compradas.length && porComprar.length ? '<span class="label">Ya compradas</span>' : '')
        + compradas.map(cardItem).join('')}
  `;
}

function vistaPena(c){
  const filas = S.gente.map(p => {
    const asignadas = S.items.filter(i=>i.estado==='pillada' && i.pilladorId===p.id).length;
    const s = c.saldo[p.id];
    const cls = claseSaldo(s);
    const estado = s>0?'le deben':(s<0?'debe':'en paz');
    const subs = [];
    if(p.admin) subs.push('Organiza la fiesta');
    if(asignadas) subs.push(`trae ${asignadas} cosa${asignadas===1?'':'s'}`);
    return `
    <div class="persona-fila" data-persona="${esc(p.id)}">
      ${avatarHtml(p.id)}
      <div class="centro">
        <div class="nombre">${esc(p.nombre)}${p.id===S.yo?' (tú)':''}${p.admin?LLAVE:''}</div>
        ${subs.length?`<div class="subtexto">${esc(subs.join(' · '))}</div>`:''}
      </div>
      <div class="saldo ${cls}">
        <span class="cifra">${s>0?'+':''}${eur(s)}</span>
        <span class="estado">${estado}</span>
      </div>
    </div>`;
  }).join('');
  return `
    <div class="cabecera"><h1>La peña</h1><div class="sub">${S.gente.length} en la cuadrilla</div></div>
    <div class="card" style="padding:4px 14px">${filas}</div>
    <button class="btn btn-primary btn-block" id="btnInvitar" type="button" style="margin-top:6px">Mandar al grupo</button>
    <form class="fila-add" id="formAddPersona" style="margin-top:14px">
      <input type="text" id="inPersona" placeholder="Añadir a alguien a mano" maxlength="20" autocomplete="off">
      <button class="btn btn-borde" type="submit">Añadir</button>
    </form>
  `;
}

function vistaCuentas(c){
  if(c.total === 0){
    return `
      <div class="cabecera"><h1>Las cuentas</h1><div class="sub">Bizums mínimos pa quedar en paz</div></div>
      <div class="vacio">Aún no hay gastos apuntados.<br>En cuanto la peña compre cosas, aquí salen las cuentas.</div>
      <div style="text-align:center"><button class="btn btn-green" id="btnGastoDirecto" type="button">Apuntar un gasto</button></div>`;
  }

  const flecha = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h15M14 6l6 6-6 6"/></svg>';
  const check = '<svg viewBox="0 0 24 24"><path d="M4.5 12.5l5 5 10-11"/></svg>';
  const pendientes = bizumsPendientes(c);

  // Your account comes first.
  let miCuenta;
  if(!S.yo){
    miCuenta = `<div class="card">
      <span class="label">Tu cuenta</span>
      <div class="micuenta-accion" style="border-top:none;margin-top:0;padding-top:2px">
        <span class="texto">Di quién eres y te digo cómo vas.</span>
        <button class="btn btn-primary btn-mini" id="btnQuienSoy" type="button">¿Quién eres?</button>
      </div>
    </div>`;
  } else {
    const s = c.saldo[S.yo] || 0;
    const cls = claseSaldo(s);
    const titulo = s === 0 ? 'Estás en paz' : s > 0 ? `Te deben ${eur(s)}` : `Debes ${eur(-s)}`;
    const misBizums = pendientes.filter(b => b.de === S.yo || b.a === S.yo);
    const acciones = misBizums.map(b => b.de === S.yo
      ? `<div class="micuenta-accion">
          <span class="texto">Haz bizum de <b>${eur(b.cents)}</b> a <b>${esc(persona(b.a).nombre)}</b></span>
          <button class="btn btn-soft btn-mini" data-copiabizum="${esc(b.a)}" data-cents="${b.cents}" type="button">Copiar</button>
        </div>`
      : `<div class="micuenta-accion">
          <span class="texto"><b>${esc(persona(b.de).nombre)}</b> te debe <b>${eur(b.cents)}</b></span>
        </div>`).join('');
    miCuenta = `<div class="card">
      <span class="label">Tu cuenta</span>
      <div class="micuenta-cifra ${cls}">${titulo}</div>
      <div class="micuenta-desglose">Pagaste ${eur(c.pagado[S.yo]||0)} · te tocaba ${eur(c.debe[S.yo]||0)}</div>
      ${acciones || (s === 0 ? '<div class="micuenta-accion"><span class="texto">Ni pa ti ni pa mí. Así da gusto.</span></div>' : '')}
    </div>`;
  }

  // "Per head" only when true: all purchases consumed by everyone.
  const uniforme = S.items.every(i => i.estado !== 'comprada' || !i.consumen || !i.consumen.length);
  const subTotal = uniforme
    ? `${eur(Math.round(c.total / S.gente.length))} por cabeza`
    : 'repartido según quién cata cada cosa';

  const bizumsHtml = c.bizums.map(b => {
    const key = claveBizum(b), hecho = hechoBizum(b);
    return `<div class="card bizum-fila ${hecho?'hecho':''}">
      <div class="quien">${esc(persona(b.de).nombre)}${flecha}${esc(persona(b.a).nombre)}</div>
      <span class="cuanto">${eur(b.cents)}</span>
      <button class="check ${hecho?'on':''}" data-bizum="${esc(key)}" type="button"
        aria-label="${hecho?'Deshacer':'Marcar'} bizum de ${esc(persona(b.de).nombre)} a ${esc(persona(b.a).nombre)}">${check}</button>
    </div>`;
  }).join('');

  const todoEnPaz = c.bizums.length>0 && pendientes.length===0;

  return `
    <div class="cabecera"><h1>Las cuentas</h1><div class="sub">Bizums mínimos pa quedar en paz</div></div>
    ${miCuenta}
    <div class="card total-card">
      <div class="cifra">${eur(c.total)}</div>
      <div class="porcabeza">${subTotal}</div>
    </div>
    ${c.bizums.length ? '<span class="label">Bizums de todos</span>' : ''}
    ${bizumsHtml}
    ${todoEnPaz ? '<div class="enpaz">Cuentas claras y el chocolate espeso.</div>'
      : c.bizums.length ? '<div class="pie-nota">Marca el círculo cuando el bizum esté hecho.</div>'
      : '<div class="enpaz">Cuentas en paz. Ni pa ti ni pa mí.</div>'}
    <button class="btn btn-primary btn-block" id="btnCompartirCuentas" type="button" style="margin-top:14px;padding:14px">
      Mandar las cuentas al grupo</button>
  `;
}

/* ================= render ================= */
function pintar(){
  sync.pintarLuego = false; // Any render path clears the deferred-render debt.
  document.body.classList.toggle('sin-fiesta', !S);
  const v = $('#vista');
  if(!S){
    v.innerHTML = vistaEntrada();
    conectarEntrada(v);
    return;
  }
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('activa', t.dataset.tab === S.tab));
  const c = cuentas();
  const pend = bizumsPendientes(c).length;
  const badge = $('#badgeCuentas');
  badge.hidden = pend===0;
  badge.textContent = pend;

  v.innerHTML = S.tab==='fiesta' ? vistaFiesta(c)
    : S.tab==='lista' ? vistaLista()
    : S.tab==='pena' ? vistaPena(c)
    : vistaCuentas(c);
  conectar(v);
}

function conectarEntrada(v){
  v.querySelector('#btnUnirme').onclick = () => {
    const txt = v.querySelector('#inEnlace').value.trim();
    if(!txt) return sheetUnirse();
    if(!importar(txt)) toast('Ahí no hay ninguna fiesta que valga');
  };
  v.querySelector('#btnCrear').onclick = sheetCrear;
  v.querySelector('#btnVerEjemplo').onclick = () => {
    resetSync();
    S = demo(); guardarLocal(); pintar(); sheetIdentidad(true);
  };
}

function conectar(v){
  const on = (sel, fn) => { const el = v.querySelector(sel); if(el) el.onclick = fn; };

  /* party / home */
  on('#btnInvitar', () => sheetCompartir('invitar'));
  on('#btnPonerVivo', activarVivo);
  on('#btnQuienSoy', () => sheetIdentidad(false));
  on('#btnMiCuenta', () => { S.tab='cuentas'; guardar(); pintar(); });
  on('#btnAccion', e => {
    const ir = v.querySelector('#btnAccion').dataset.ir;
    if(ir === 'gasto'){
      if(!S.yo) return sheetIdentidad(true);
      sheetGasto(null);
    } else { S.tab = ir; guardar(); pintar(); }
  });
  on('#btnRenombrar', sheetRenombrar);
  on('#btnNueva', () => sheetConfirmar('¿Empezar otra fiesta?',
    S.remota
      ? 'Se quita de tu móvil, pero sigue en vivo pa la peña: con el enlace del grupo vuelves cuando quieras.'
      : 'Esta se borra de tu móvil. Si quieres conservarla, copia antes el enlace de invitación: sirve de copia de seguridad.', () => {
      resetSync();
      S = null; localStorage.removeItem(CLAVE); pintar();
    }));
  on('#btnVerEjemplo', () => sheetConfirmar('¿Cargar la fiesta de ejemplo?',
    S.remota
      ? 'La tuya sigue en vivo pa la peña; el ejemplo va solo en este móvil.'
      : 'Se borrará la actual de este móvil (la de tus colegas no se toca).', () => {
      respaldarActual();
      resetSync();
      S = demo(); guardarLocal(); pintar(); sheetIdentidad(true);
    }));

  /* list */
  const form = v.querySelector('#formAddItem');
  if(form) form.onsubmit = e => {
    e.preventDefault();
    const n = v.querySelector('#inItem').value.trim();
    if(!n) return toast('Escribe algo, que la lista no adivina.');
    if(S.items.length >= 500) return toast('La lista no da pa más (500 cosas). Quita algo primero.');
    S.items.unshift(tocar({id:nuevoId('i'), nombre:n, estado:'pendiente',
      creadoEn:ahora(), creadoPor:S.yo || null}));
    guardar(); pintar(); toast('«' + n + '» apuntado');
  };
  on('#btnGastoDirecto', () => {
    if(!S.yo) return sheetIdentidad(true);
    sheetGasto(null);
  });
  on('#btnMandarLista', () => sheetCompartir('lista'));
  // The party may have changed underneath while rendering was deferred because
  // an input had half-written text. Every action revalidates item state so it
  // does not overwrite a purchase another phone just resolved.
  v.querySelectorAll('[data-pillar]').forEach(b => b.onclick = () => {
    if(!S.yo) return sheetIdentidad(true);
    const it = elItem(b.dataset.pillar);
    if(!itemSinDueno(it)){
      pintar(); return toast('Alguien se ha adelantado: esa ya está resuelta.');
    }
    it.estado='pillada'; it.pilladorId=S.yo;
    tocar(it);
    guardar(); pintar(); toast('Apuntado: ' + it.nombre + ' corre de tu cuenta.');
  });
  v.querySelectorAll('[data-soltar]').forEach(b => b.onclick = () => {
    const it = elItem(b.dataset.soltar);
    if(!it || it.estado !== 'pillada'){
      pintar(); return toast('Esa ya ha cambiado de manos.');
    }
    if(it.pilladorId !== S.yo && !soyAdmin()){
      pintar(); return toast('Esa la trae ' + (persona(it.pilladorId)?.nombre || 'otro') + ': soltarla es cosa suya o de la llave.');
    }
    it.estado='pendiente'; delete it.pilladorId;
    tocar(it);
    guardar(); pintar(); toast('Suelta. A ver quién se la pide ahora.');
  });
  v.querySelectorAll('[data-asignar]').forEach(b => b.onclick = () => {
    if(!soyAdmin()) return toast('Eso es cosa de la llave');
    sheetAsignar(b.dataset.asignar);
  });
  v.querySelectorAll('[data-comprar]').forEach(b => b.onclick = () => {
    if(!S.yo) return sheetIdentidad(true);
    sheetGasto(b.dataset.comprar);
  });
  v.querySelectorAll('[data-editar]').forEach(card => card.onclick = e => {
    if(e.target.closest('button')) return;
    const it = S.items.find(x=>x.id===card.dataset.editar);
    if(!it) return;
    if(!soyAdmin() && it.compradorId !== S.yo){
      const quien = persona(it.compradorId);
      return toast('Solo ' + (quien?quien.nombre:'quien la pagó') + ' o la llave pueden tocarla');
    }
    sheetGasto(card.dataset.editar);
  });
  v.querySelectorAll('[data-quitar]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    const it = elItem(b.dataset.quitar);
    if(!it) return pintar();
    if(it.estado === 'comprada'){
      // Another phone just bought it; deleting money requires confirmation.
      pintar(); return toast('Esa ya está comprada: tócala si quieres corregirla.');
    }
    // Render-time permission (admin or unowned) is revalidated on tap. With
    // deferred rendering, the x button may predate someone claiming the item.
    if(!soyAdmin() && it.pilladorId){
      pintar(); return toast('Esa ya la trae ' + (persona(it.pilladorId)?.nombre || 'alguien') + ': no se quita así como así.');
    }
    enterrar('items', it);
    guardar(); pintar();
  });

  /* group */
  const formP = v.querySelector('#formAddPersona');
  if(formP) formP.onsubmit = e => {
    e.preventDefault();
    const n = v.querySelector('#inPersona').value.trim();
    if(!n) return;
    if(S.gente.length >= 100) return toast('La peña no da pa más (100). Menuda fiesta.');
    S.gente.push(tocar({id:nuevoId('p'), nombre:n, admin:false}));
    guardar(); pintar(); toast(n + ' se une a la peña');
  };
  v.querySelectorAll('[data-persona]').forEach(f => f.onclick = () => sheetPersona(f.dataset.persona));

  /* accounts */
  v.querySelectorAll('[data-bizum]').forEach(b => b.onclick = () => {
    const key = b.dataset.bizum;
    const c = cuentas();
    const bz = c.bizums.find(x => claveBizum(x) === key);
    if(!bz) return pintar(); // Accounts changed underneath.
    const hecho = !hechoBizum(bz);
    // Store the paid amount with the mark. If the Bizum amount later changes,
    // the new amount becomes pending again.
    S.saldados[key] = {hecho, t:ahora(), por:S.yo || null, cents: bz.cents};
    podarSaldados(S.saldados, S.gente); // Keep this path bounded too.
    if(hecho){
      if(c.bizums.every(x => claveBizum(x) === key || hechoBizum(x))) toast('Cuentas claras y el chocolate espeso.');
      else toast('Bizum apuntado');
    }
    guardar(); pintar();
  });
  v.querySelectorAll('[data-copiabizum]').forEach(b => b.onclick = async () => {
    const quien = persona(b.dataset.copiabizum);
    const txt = `Bizum de ${eur(Number(b.dataset.cents))} a ${quien ? quien.nombre : '—'} — «${S.fiesta.nombre}»`;
    const ok = await copiar(txt);
    toast(ok ? 'Copiado. Al Bizum y arreando.' : 'No se ha podido copiar');
  });
  on('#btnCompartirCuentas', () => sheetCompartir('cuentas'));
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  if(!S) return;
  S.tab = t.dataset.tab; guardar(); pintar();
}));

/* startup: live link (#F:id:clave), snapshot (#AP1:/#EB1:), or saved state */
(function(){
  // Shared-state baseline as loaded. Without this, the first local-only save
  // (switching tabs) would count as a party change.
  if(S && S.remota) sync.compartidoActual = estadoJson();
  let hash = location.hash || '';
  try { hash = decodeURIComponent(hash); } catch(e){ /* A stray % must not crash the app. */ }
  const limpiarHash = () => {
    try { history.replaceState(null,'',location.pathname + location.search); } catch(e){}
  };

  const vivo = hash.match(RE_VIVO);
  if(vivo){
    pintar();
    if(!S) toast('Abriendo la fiesta del grupo…');
    // Clear the hash only if the party opens. Without network, reload retries.
    abrirEnlaceVivo(vivo[1].toLowerCase(), vivo[2].toLowerCase())
      .then(ok => { if(ok) limpiarHash(); });
    return;
  }

  if(hash.length > 4){
    const obj = decodificar(hash);
    if(obj){
      limpiarHash();
      // An old snapshot link must not silently disconnect a live party.
      if(S && S.remota && !S.fiesta.ejemplo){
        pintar();
        sheetConfirmar('¿Abrir la fiesta del enlace?',
          'Ese enlace lleva una copia congelada. Tu fiesta en vivo se queda a salvo: vuelves a ella con el enlace del grupo.',
          () => aplicarImportado(obj));
        bajar();
        return;
      }
      aplicarImportado(obj);
      return;
    }
  }
  pintar();
  if(S && !S.yo) sheetIdentidad(true);
  if(S && S.remota) bajar();
})();

/* live parties keep themselves up to date */
setInterval(() => {
  if(document.visibilityState !== 'visible' || !S || !S.remota) return;
  refrescarSync();
  if(sync.pintarLuego) pintarOLuego();
  // Download first, upload after, in order. Processing a stale GET after a PUT
  // would create revision bounce.
  bajar().then(() => {
    if(S && S.remota && (sync.sinRed || S.pendienteSubida)) subir();
  });
}, 12000);
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') bajar();
});
// When connectivity returns, poll first to seed the baseline, then upload.
window.addEventListener('online', async () => { await bajar(); subir(); });
</script>
</body>
